# llama-swap config — GPU variant (daily driver). An OpenAI-compatible proxy that loads/unloads
# llama-server on demand by the request's `model` field. Mounted into the container at
# /app/config.yaml (via the NVMe symlink /home/suzu/ai-models/llama-swap/active.yaml — see below).
#
#   chat = the VL MoE (brain + eyes) on the GPU.
#
# GAMING / GPU-FREE without resetting her conversation: OLV *always* requests model `chat`. To move
# her to CPU (freeing the GPU for a game or image generation) we DON'T touch OLV — we swap which
# config the `chat` name resolves to. `companion-ctl gpu-free` repoints the active.yaml symlink to
# llama-swap-cpu.yaml (where `chat` = a text-only MoE on CPU) and restarts ONLY llama-swap; OLV
# keeps its process + in-memory conversation and its next request transparently hits the CPU model.
# `companion-ctl gpu-back` repoints to this file. The symlink resets to GPU on nixos activation
# (tmpfiles L+ in modules/ai/companion-host.nix). Manual full unload (she sleeps): POST
# /api/models/unload.

healthCheckTimeout: 600   # a 30B MoE (+ mmproj) loading from NVMe can take a while

models:
  "chat":                 # daily driver — VL MoE on the GPU (our tuned flags)
    cmd: >
      /app/llama-server
      -m /models/qwen3-vl-30b-a3b-abliterated/Huihui-Qwen3-VL-30B-A3B-Instruct-abliterated.i1-Q4_K_M.gguf
      --mmproj /models/qwen3-vl-30b-a3b-abliterated/Huihui-Qwen3-VL-30B-A3B-Instruct-abliterated.mmproj-f16.gguf
      --image-min-tokens 1024
      --host 127.0.0.1 --port ${PORT}
      -ngl 999 --n-cpu-moe 30 --no-mmap -c 32768 -fa on -ctk q8_0 -ctv q8_0
      --threads 16 -b 2048 -ub 2048 --jinja
    ttl: 0                # never auto-unload the daily driver
