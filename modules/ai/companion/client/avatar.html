<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Companion — Avatar</title>
    <style>
      html, body { margin: 0; height: 100%; background: #1e1e2e; overflow: hidden; touch-action: none; }
      /* touch-action:none => the browser won't steal touch drags for scroll/zoom, so a finger
         drag on the Y70 touchscreen reaches our pointer handlers (rotate/reposition) fully. */
      #canvas { width: 100vw; height: 100vh; display: block; touch-action: none; }
      #status { position: absolute; top: 6px; left: 8px; font: 11px sans-serif; color: #6c7086; }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "./node_modules/three/build/three.module.js",
          "three/addons/": "./node_modules/three/examples/jsm/",
          "@pixiv/three-vrm": "./node_modules/@pixiv/three-vrm/lib/three-vrm.module.js",
          "@pixiv/three-vrm-animation": "./node_modules/@pixiv/three-vrm-animation/lib/three-vrm-animation.module.js"
        }
      }
    </script>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div id="status">loading…</div>
    <script type="module" src="avatar.js"></script>
  </body>
</html>
