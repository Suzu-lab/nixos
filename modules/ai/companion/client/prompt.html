<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Companion — Prompt</title>
    <style>
      :root { --bg:#181825; --panel:#1e1e2e; --text:#cdd6f4; --accent:#cba6f7; --muted:#6c7086; }
      * { box-sizing: border-box; }
      html, body { margin:0; height:100%; background:var(--bg); color:var(--text);
        font-family: sans-serif; overflow:hidden; }
      #app { display:flex; flex-direction:column; height:100%; }
      #header { display:flex; align-items:center; gap:8px; padding:8px 12px; background:var(--panel);
        -webkit-app-region: drag; font-weight:bold; }
      #header .dot { width:8px; height:8px; border-radius:50%; background:#f38ba8; }
      #header .dot.on { background:#a6e3a1; }
      #log { flex:1; overflow-y:auto; padding:10px 12px; font-size:14px; line-height:1.45; }
      #log .ai { color:var(--text); margin:5px 0; }
      #log .me { color:var(--accent); margin:5px 0; text-align:right; }
      #inputbar { display:flex; gap:6px; padding:10px; background:var(--panel); -webkit-app-region: no-drag; align-items:center; }
      #text { flex:1; padding:9px 12px; border-radius:10px; border:1px solid #313244;
        background:var(--bg); color:var(--text); outline:none; }
      #send { padding:9px 16px; border:none; border-radius:10px; background:var(--accent);
        color:#11111b; cursor:pointer; font-weight:bold; }
      #mic, #attach { padding:8px 10px; border:none; border-radius:10px; background:#313244; color:var(--text);
        cursor:pointer; font-size:15px; line-height:1; }
      #mic.off { background:#f38ba8; color:#11111b; } /* muted */
      #attachments { display:flex; flex-wrap:wrap; gap:6px; padding:0 10px; background:var(--panel); }
      #attachments:not(:empty) { padding:8px 10px; }
      .thumb { position:relative; width:56px; height:56px; border-radius:8px; overflow:hidden; border:1px solid #313244; }
      .thumb img { width:100%; height:100%; object-fit:cover; display:block; }
      .thumb .rm { position:absolute; top:1px; right:1px; width:16px; height:16px; border:none; border-radius:50%;
        background:rgba(17,17,27,.8); color:var(--text); cursor:pointer; font-size:11px; line-height:16px; padding:0; }
      #log .me img { max-width:180px; max-height:180px; border-radius:8px; margin-top:4px; display:inline-block; }
      #dropzone { position:fixed; inset:0; background:rgba(203,166,247,.12); border:2px dashed var(--accent);
        display:none; align-items:center; justify-content:center; color:var(--accent); font-weight:bold; z-index:10; }
      #dropzone.on { display:flex; }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="header"><span class="dot" id="dot"></span><span>Reika</span></div>
      <div id="log"></div>
      <div id="attachments"></div>
      <div id="inputbar">
        <button id="mic" title="Microphone">🎤</button>
        <button id="attach" title="Attach image">📎</button>
        <input id="text" placeholder="Message Reika… (Enter, or paste/drop an image)" autocomplete="off" />
        <button id="send">Send</button>
      </div>
    </div>
    <input type="file" id="file" accept="image/*" multiple style="display:none" />
    <div id="dropzone">Drop image to attach</div>
    <script src="prompt.js"></script>
  </body>
</html>
