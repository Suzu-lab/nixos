# SearXNG config for the local AI companion (Phase 5 web search).
# Mounted at /etc/searxng/settings.yml in the searxng container. use_default_settings
# inherits all upstream defaults; we only override what the MCP search tool needs.
use_default_settings: true

server:
  # Secret injected by sops-nix at activation (see modules/nixos/secrets.nix → sops.templates).
  # This file is a TEMPLATE: @SECRET_KEY@ is replaced with the decrypted searxng_secret_key and the
  # rendered result is mounted into the container. No real secret lives in this git-tracked file.
  secret_key: "@SECRET_KEY@"
  # Disable the bot/rate limiter: the MCP tool queries the JSON API server-to-server,
  # which the limiter would otherwise reject (HTTP 403). Safe here — bound to localhost
  # / the internal docker network only, never exposed to the internet.
  limiter: false
  image_proxy: false

search:
  # The MCP search tool needs the JSON API; the default only enables 'html'.
  formats:
    - html
    - json
