[backdrop]
blur_intensity = 0.29999999329447746
enabled = true
tint_intensity = 0.29999999329447746

[bar.widgets]
background_opacity = 0.85999998077750206
center = [ "workspaces", "cat" ]
enabled = false
end = [ "tray", "notifications", "clipboard", "network", "volume", "brightness", "clock", "session" ]
margin_edge = 2
margin_ends = 7
start = [ "launcher", "media", "control-center", "sysmon" ]
thickness = 30

    [bar.widgets.monitor.DP-1]
    enabled = true

[brightness]
enable_ddcutil = true

[control_center]
hidden_tabs = [ "power", "bluetooth" ]
shortcuts = []

[lockscreen_widgets]
enabled = false
schema_version = 2
widget_order = [
    "lockscreen-login-box@DP-3",
    "lockscreen-login-box@HDMI-A-1",
    "lockscreen-login-box@DP-2",
    "lockscreen-login-box@DP-1"
]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@DP-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 1536.0
    cy = 1609.0
    output = "DP-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@DP-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

    [lockscreen_widgets.widget."lockscreen-login-box@DP-2"]
    box_height = 70.0
    box_width = 400.0
    cx = 341.0
    cy = 2441.0
    output = "DP-2"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@DP-2".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

    [lockscreen_widgets.widget."lockscreen-login-box@DP-3"]
    box_height = 70.0
    box_width = 400.0
    cx = 1280.0
    cy = 961.0
    output = "DP-3"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@DP-3".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

    [lockscreen_widgets.widget."lockscreen-login-box@HDMI-A-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 540.0
    cy = 2441.0
    output = "HDMI-A-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@HDMI-A-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

[plugins]
enabled = [ "noctalia/bongocat" ]

[shell]
app_icon_colorize = true
avatar_path = "/home/suzu/Pictures/Profile Pics/Cereal Experiments Lain.png"
launch_apps_as_systemd_services = true
niri_overview_type_to_launch_enabled = true
polkit_agent = true
screen_time_enabled = true

    [shell.launcher]
    app_grid = true

    [shell.panel]
    transparency_mode = "glass"

    [shell.screen_corners]
    enabled = true

    [shell.screenshot]
    confirm_region = true
    directory = "~/Pictures/Screenshots"

[system.monitor]
gpu_poll_seconds = 2.0

[theme]
builtin = "Catppuccin"
community_palette = "Oxocarbon"
mode = "dark"
wallpaper_scheme = "m3-content"

    [theme.templates]
    builtin_ids = [ "kitty", "niri" ]
    community_ids = [ "zen-browser", "obsidian", "steam", "yazi" ]

[wallpaper]
directory = "~/Wallpapers/"
per_monitor_directories = true
transition_on_startup = true

    [wallpaper.default]
    path = "/home/suzu/Wallpapers/Landscape/shion_01_landscape.png"

    [wallpaper.last]
    path = "/home/suzu/Wallpapers/Landscape/xzu_05_landscape.png"

    [wallpaper.monitor.DP-1]
    directory = "~/Wallpapers/Landscape"

    [wallpaper.monitor.DP-2]
    directory = "~/Wallpapers/Portrait"

    [wallpaper.monitor.DP-3]
    directory = "~/Wallpapers/Landscape"

    [wallpaper.monitor.HDMI-A-1]
    directory = "~/Wallpapers/Portrait"

    [wallpaper.monitors.DP-1]
    path = "/home/suzu/Wallpapers/Landscape/lifeline_05_landscape.png"

    [wallpaper.monitors.DP-2]
    path = "/home/suzu/Wallpapers/Portrait/guweiz_13_portrait.png"

    [wallpaper.monitors.DP-3]
    path = "/home/suzu/Wallpapers/Landscape/xzu_05_landscape.png"

    [wallpaper.monitors.HDMI-A-1]
    path = "/home/suzu/Wallpapers/Portrait/guweiz_25_portrait.png"

[widget.cat]
scale = 2.5
type = "noctalia/bongocat:cat"

[widget.sysmon]
stat = "gpu_vram"

[widget.workspaces]
display = "none"
hide_when_empty = true